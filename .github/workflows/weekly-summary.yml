name: Weekly Health Summary

on:
  schedule:
    # Every Sunday at 9 PM ET (01:00 UTC Monday)
    - cron: "0 1 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: weekly-health-summary
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Compute date window
        id: dates
        run: |
          python -c "
          from datetime import date, timedelta
          today = date.today()
          days_since_sunday = (today.weekday() + 1) % 7 or 7
          last_sunday = today - timedelta(days=days_since_sunday)
          this_start = last_sunday - timedelta(days=6)
          prev_start = this_start - timedelta(days=7)
          this_end = last_sunday
          print(f'WINDOW_START={prev_start.isoformat()}')
          print(f'WINDOW_END={this_end.isoformat()}')
          print(f'THIS_START={this_start.isoformat()}')
          print(f'THIS_END={this_end.isoformat()}')
          " >> "$GITHUB_OUTPUT"

      - name: Pre-download latest MacroFactor export from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          MACROFACTOR_XLSX_PATH: /tmp/macrofactor.xlsx
        run: python scripts/fetch_macrofactor_export.py

      - name: Extract MacroFactor CSV from xlsx
        env:
          MACROFACTOR_XLSX_PATH: /tmp/macrofactor.xlsx
        run: |
          python -c "
          from scripts.weekly_summary import load_macrofactor_csv
          from datetime import date
          from pathlib import Path
          start = date.fromisoformat('${{ steps.dates.outputs.WINDOW_START }}')
          end = date.fromisoformat('${{ steps.dates.outputs.WINDOW_END }}')
          csv_text = load_macrofactor_csv(Path('/tmp/macrofactor.xlsx'), start, end)
          Path('/tmp/macrofactor_filtered.csv').write_text(csv_text)
          print(f'wrote {len(csv_text.splitlines())-1} rows to /tmp/macrofactor_filtered.csv')
          "

      - name: Pre-fetch workout data from Google Sheets
        env:
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          WORKOUTS_CSV_PATH: /tmp/workouts.csv
          WINDOW_START: ${{ steps.dates.outputs.WINDOW_START }}
          WINDOW_END: ${{ steps.dates.outputs.WINDOW_END }}
        run: python scripts/fetch_workouts.py

      - name: Compute cycle phase from Clue data
        env:
          CLUE_EXPORT_PATH: data/clue_measurements.json
          CLUE_CONTEXT_PATH: /tmp/clue_context.txt
          WINDOW_START: ${{ steps.dates.outputs.WINDOW_START }}
          WINDOW_END: ${{ steps.dates.outputs.WINDOW_END }}
        run: python scripts/fetch_clue_data.py

      - name: Precompute workout and nutrition stats
        env:
          WORKOUTS_CSV_PATH: /tmp/workouts.csv
          MACROFACTOR_CSV_PATH: /tmp/macrofactor_filtered.csv
          STATS_PATH: /tmp/precomputed_stats.txt
          WINDOW_START: ${{ steps.dates.outputs.WINDOW_START }}
          WINDOW_END: ${{ steps.dates.outputs.WINDOW_END }}
          THIS_START: ${{ steps.dates.outputs.THIS_START }}
          THIS_END: ${{ steps.dates.outputs.THIS_END }}
        run: python scripts/precompute_stats.py

      - name: Run weekly summary agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENT_ID: ${{ secrets.AGENT_ID }}
          ENVIRONMENT_ID: ${{ secrets.ENVIRONMENT_ID }}
          VAULT_ID: ${{ secrets.VAULT_ID }}
          MACROFACTOR_XLSX_PATH: /tmp/macrofactor.xlsx
          WORKOUTS_CSV_PATH: /tmp/workouts.csv
          CLUE_CONTEXT_PATH: /tmp/clue_context.txt
          STATS_PATH: /tmp/precomputed_stats.txt
        run: python scripts/weekly_summary.py
